name: Secret Scan

on:
  push:
    branches:
      - master
      - main
  pull_request:
  schedule:
    - cron: "53 10 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for committed secrets
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
