name: CodeQL

on:
  push:
    branches:
      - master
      - main
  pull_request:
  schedule:
    - cron: "37 11 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended,security-and-quality

      - name: Configure
        run: >
          cmake
          -S .
          -B build-codeql
          -DCMAKE_BUILD_TYPE=Debug
          -DSTACKIMPORT_WARNINGS_AS_ERRORS=OFF

      - name: Build
        run: cmake --build build-codeql --target stackimport-tests --parallel

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
